name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://knnarin:$HF_TOKEN@huggingface.co/spaces/knnarin/careerbandhu

          # Orphan push: send only current file state, not full git history.
          # Prevents HF 10MB-per-file pre-receive rejection on old large blobs.
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy $(git rev-parse --short HEAD)"

          success=false
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            if git push hf hf-deploy:main --force --verbose 2>&1; then
              success=true
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Attempt $i FAILED"
            if [ $i -lt 3 ]; then
              echo "Retrying in 60s (HF rate limit buffer)..."
              sleep 60
            fi
          done

          if [ "$success" != "true" ]; then
            echo "ERROR: All push attempts to Hugging Face failed!"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## CareerBandhu Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** https://knnarin-careerbandhu.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Space | [knnarin/careerbandhu](https://huggingface.co/spaces/knnarin/careerbandhu) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
