name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global credential.helper store
          git remote add hf https://knnarin:$HF_TOKEN@huggingface.co/spaces/knnarin/careerbandhuv

          echo "=== Remote info ==="
          git remote -v

          echo "=== Attempting push ==="
          success=false
          for i in 1 2 3; do
            echo "Attempt $i/3..."
            if git push hf master:main --force --verbose 2>&1; then
              success=true
              echo "Push succeeded on attempt $i"
              break
            fi
            echo "Attempt $i FAILED (exit code: $?)"
            if [ $i -lt 3 ]; then
              echo "Retrying in 15s..."
              sleep 15
            fi
          done

          if [ "$success" != "true" ]; then
            echo "ERROR: All push attempts to Hugging Face failed!"
            exit 1
          fi

      - name: Verify deployment
        run: |
          echo "Waiting 30s for HF Space to register the push..."
          sleep 30
          echo "Checking HF Space API..."
          curl -sf https://knnarin-careerbandhuv.hf.space/ || echo "Space not yet live (may still be building)"

      - name: Summary
        run: |
          echo "## CareerBandhuv Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** https://knnarin-careerbandhuv.hf.space" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Space | [knnarin/careerbandhuv](https://huggingface.co/spaces/knnarin/careerbandhuv) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \ |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
